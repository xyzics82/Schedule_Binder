name: Supabase keep-alive

# 무료 플랜 자동 일시정지(약 1주 미사용 시) 방지용.
# 매일 가벼운 REST 요청을 보내 Supabase 프로젝트 활동을 유지한다.
# 추가로, 장기간 저장소에 활동이 없으면 GitHub가 cron 워크플로우 자체를
# 60일 후 자동 비활성화하므로, 마지막 커밋이 오래되면 heartbeat 커밋을 남겨
# 스케줄이 꺼지지 않게 한다.

on:
  schedule:
    - cron: "0 3 * * *" # 매일 03:00 UTC (12:00 KST)
  workflow_dispatch: {}

permissions:
  contents: write # heartbeat 커밋 push 용

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Supabase REST API
        run: |
          SUPABASE_URL="https://ktchyquqqmvvsmnqpurm.supabase.co"
          APIKEY="sb_publishable_kdwfBTunk1RQxbRVcaXKYg_5M2zlxdH"
          # 새 키 형식은 apikey + Authorization: Bearer 둘 다 요구할 수 있음.
          # 프로젝트가 깨어나는 중이면 일시적 5xx가 날 수 있어 재시도한다.
          status=$(curl -sS --max-time 30 --retry 4 --retry-delay 5 --retry-all-errors \
            -o /tmp/body -w "%{http_code}" \
            -H "apikey: ${APIKEY}" \
            -H "Authorization: Bearer ${APIKEY}" \
            "${SUPABASE_URL}/rest/v1/app_states?select=id&limit=1") || status="000"
          echo "HTTP ${status}"
          cat /tmp/body 2>/dev/null || true
          echo
          # 2xx/3xx/4xx = Supabase 게이트웨이·DB에 도달 → 활동으로 집계됨(keep-alive 성공)
          # 5xx·000 = 연결 실패/일시정지 의심 → 실패로 표시해 알림
          case "${status}" in
            2*|3*|4*) echo "Supabase 도달 확인 (HTTP ${status}) — Keep-alive OK" ;;
            *) echo "Supabase 도달 실패 (HTTP ${status}) — 일시정지/다운 의심"; exit 1 ;;
          esac

      - name: Keep schedule alive (prevent 60-day auto-disable)
        run: |
          # GitHub는 저장소 활동이 60일간 없으면 cron 워크플로우를 자동 비활성화한다.
          # 마지막 커밋이 50일 이상 지났으면 가벼운 heartbeat 커밋을 남겨 갱신한다.
          last=$(git log -1 --format=%ct)
          now=$(date +%s)
          days=$(( (now - last) / 86400 ))
          echo "마지막 커밋 이후 경과일: ${days}일"
          if [ "${days}" -ge 50 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            mkdir -p .github
            date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive-heartbeat.txt
            git add .github/keepalive-heartbeat.txt
            git commit -m "chore: keepalive heartbeat [skip ci]"
            git push
            echo "heartbeat 커밋 생성·push 완료"
          else
            echo "최근 활동 있음 — heartbeat 불필요"
          fi
